name: Update Formulae

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

permissions:
  contents: write

concurrency:
  group: update-formulae
  cancel-in-progress: false

jobs:
  update:
    name: Update formulae from releases
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tap
        uses: actions/checkout@v6

      - name: Update formulae
        run: scripts/update-formulas.sh
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula
          if git diff --cached --quiet; then
            echo "Formulae already up to date."
            exit 0
          fi
          git commit -m "Update Homebrew formulae"
          git push
